# Shared Taskfile for Go projects
# Required variables: USER_NAME, ARTIFACT_NAME
# Optional variables: COMMANDS (array of command names; omit for library projects)

version: '3'

includes:
  helpers:
    taskfile: Taskfile.helpers.yaml

tasks:
  init:
    desc: "Initialize the Go module and download dependencies"
    cmds:
      - go mod init github.com/{{.USER_NAME}}/{{.ARTIFACT_NAME}} || true
      - go mod tidy
      - go mod download

  clean:
    desc: "Clean up generated files and binaries"
    cmds:
      - |
        {{if .COMMANDS}}
        {{if eq OS "windows"}}
        {{- range $cmd := .COMMANDS }}
        powershell -Command "if (Test-Path bin\{{$cmd}}\{{$cmd}}) { Remove-Item -Force bin\{{$cmd}}\{{$cmd}} }"
        {{- end }}
        {{else}}
        {{- range $cmd := .COMMANDS }}
        rm -f bin/{{$cmd}}/{{$cmd}}
        {{- end }}
        {{end}}
        {{end}}
      - task: helpers:delete-paths
        vars:
          PATHS: "cover.out mocks"

  generate-mocks:
    desc: "Generate mocks using mockery"
    if: '[ -f .mockery.yaml ]'
    cmds:
      - mockery --config .mockery.yaml

  verify:
    desc: "Verify the library compiles"
    cmds:
      - go build ./...

  build:
    desc: "Build all Go binaries in the COMMANDS array, or verify compilation for libraries"
    deps:
      - generate-mocks
    cmds:
      - |
        {{- if .COMMANDS }}
        {{- range $cmd := .COMMANDS }}
        go build -o bin/{{$cmd}}/{{$cmd}} cmd/{{$cmd}}/main.go
        {{- end }}
        {{- else }}
        go build ./...
        {{- end }}

  run:
    desc: "Run a specific command (usage: task go:run CMD=package-checker)"
    cmds:
      - go run cmd/{{.CMD | default .ARTIFACT_NAME}}/main.go

  debug:
    desc: "Debug a specific command with delve (usage: task go:debug CMD=package-checker)"
    cmds:
      - dlv debug --allow-non-terminal-interactive=true ./cmd/{{.CMD | default .ARTIFACT_NAME}}/main.go

  test:
    desc: "Run Go tests (excluding /test/ and /mocks/)"
    deps:
      - generate-mocks
    cmds:
      - |
        {{if eq OS "windows"}}
        go test -v $(go list ./... | findstr /V /C:"/test/" | findstr /V /C:"/mocks/")
        {{else}}
        go test -v $(go list ./... | grep -v /test/ | grep -v /mocks/)
        {{end}}

  test-with-cover:
    desc: "Run Go tests with coverage HTML report (excluding /test/ and /mocks/)"
    cmds:
      - |
        {{if eq OS "windows"}}
        go test -v -coverprofile=coverage.out $(go list ./... | findstr /V /C:"/test/" | findstr /V /C:"/mocks/")
        {{else}}
        go test -v -coverprofile=coverage.out $(go list ./... | grep -v /test/ | grep -v /mocks/)
        {{end}}
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated{{\":\"}} coverage.html"

  ci-test:
    desc: "Run tests with coverage for CI (atomic mode)"
    cmds:
      - |
        {{if eq OS "windows"}}
        go test -coverprofile=cover.out -covermode=atomic $(go list ./... | findstr /V /C:"/test/" | findstr /V /C:"/mocks/")
        {{else}}
        go test -coverprofile=cover.out -covermode=atomic $(go list ./... | grep -v /test/ | grep -v /mocks/)
        {{end}}
      - go tool cover -func=cover.out

  fmt:
    desc: "Format all Go files"
    cmds:
      - go fmt ./...

  lint:
    desc: "Run golangci-lint on the project"
    cmds:
      - golangci-lint run ./...

  check:
    desc: "Run formatting and linting checks"
    deps:
      - fmt
      - lint

  build-all:
    desc: "Build for multiple platforms"
    cmds:
      - |
        {{- if .COMMANDS }}
        {{- range $cmd := .COMMANDS }}
        GOOS=linux GOARCH=amd64 go build -o bin/{{$cmd}}-linux-amd64 ./cmd/{{$cmd}}
        GOOS=darwin GOARCH=amd64 go build -o bin/{{$cmd}}-darwin-amd64 ./cmd/{{$cmd}}
        GOOS=darwin GOARCH=arm64 go build -o bin/{{$cmd}}-darwin-arm64 ./cmd/{{$cmd}}
        GOOS=windows GOARCH=amd64 go build -o bin/{{$cmd}}-windows-amd64.exe ./cmd/{{$cmd}}
        {{- end }}
        {{- else }}
        GOOS=linux GOARCH=amd64 go build ./...
        GOOS=darwin GOARCH=amd64 go build ./...
        GOOS=darwin GOARCH=arm64 go build ./...
        GOOS=windows GOARCH=amd64 go build ./...
        {{- end }}

  install:
    desc: "Build and install to ~/.local/bin"
    deps:
      - build
    cmds:
      - |
        {{- if .COMMANDS }}
        mkdir -p {{env "HOME"}}/.local/bin
        {{- range $cmd := .COMMANDS }}
        cp bin/{{$cmd}}/{{$cmd}} {{env "HOME"}}/.local/bin/
        {{- end }}
        echo "Installed successfully! Make sure {{env "HOME"}}/.local/bin is in your PATH."
        {{- else }}
        echo "No commands to install (library project)."
        {{- end }}

  tidy:
    desc: "Tidy dependencies"
    cmds:
      - go mod tidy

  # Helper: Filter go list output to exclude test and mocks directories
  # This returns a command string that can be used in go test commands
  go-packages-filter:
    internal: true
    silent: true
    cmds:
      - |
        {{if eq OS "windows"}}
        echo "$(go list ./... | findstr /V /C:\"/test/\" | findstr /V /C:\"/mocks/\")"
        {{else}}
        echo "$(go list ./... | grep -v /test/ | grep -v /mocks/)"
        {{end}}
