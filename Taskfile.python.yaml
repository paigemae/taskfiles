# Shared Taskfile for Python projects using uv
# Required variables: ARTIFACT_NAME, COMMANDS (array of command names)

version: '3'

includes:
  helpers:
    taskfile: Taskfile.helpers.yaml

tasks:
  init:
    desc: "Initialize Python project with uv and install dependencies"
    deps:
      - venv
      - sync

  clean:
    desc: "Clean up generated files, cache, and build artifacts"
    cmds:
      - task: helpers:delete-paths
        vars:
          PATHS: ".venv dist build .pytest_cache .coverage htmlcov"
      - task: helpers:delete-pattern
        vars:
          PATTERN: "__pycache__"
          TYPE: "d"
      - task: helpers:delete-pattern
        vars:
          PATTERN: "*.pyc"
          TYPE: "f"
      - task: helpers:delete-pattern
        vars:
          PATTERN: "*.pyo"
          TYPE: "f"
      - task: helpers:delete-pattern
        vars:
          PATTERN: "*.egg-info"
          TYPE: "d"

  install:
    desc: "Build and install to ~/.local/bin"
    deps:
      - build
    cmds:
      - mkdir -p {{.HOME}}/.local/bin
      - |
        {{- range $cmd := .COMMANDS }}
        uv tool install --force --from dist/*.whl {{$cmd}}
        {{- end }}
      - echo "Installed successfully! Make sure {{.HOME}}/.local/bin is in your PATH."

  venv:
    desc: "Prepare virtual environment"
    cmds:
      - uv venv

  sync:
    desc: "Sync dependencies and export to requirements.txt"
    cmds:
      - uv sync
      - uv export --no-hashes -o requirements.txt

  run:
    desc: "Run a specific command (usage: task python:run CMD=main)"
    cmds:
      - uv run python -m {{.CMD | default .ARTIFACT_NAME}}

  test:
    desc: "Run Python tests with pytest"
    cmds:
      - uv run python -m pytest -v

  test-with-cover:
    desc: "Run Python tests with coverage HTML report"
    cmds:
      - uv run python -m pytest --cov --cov-report=html --cov-report=term -v
      - pwd
      - task: helpers:open-file
        vars:
          FILE: "htmlcov/index.html"

  ci-test:
    desc: "Run tests with coverage for CI"
    cmds:
      - uv run python -m pytest --cov --cov-report=xml --cov-report=term -v

  fmt:
    desc: "Format Python code with ruff"
    cmds:
      - uv run ruff format .

  lint:
    desc: "Lint Python code with ruff"
    cmds:
      - uv run ruff check .

  lint-fix:
    desc: "Lint and auto-fix Python code with ruff"
    cmds:
      - uv run ruff check --fix .

  check:
    desc: "Run formatting and linting checks"
    deps:
      - fmt
      - lint

  type-check:
    desc: "Run type checking with mypy"
    cmds:
      - uv run mypy .

  verify:
    desc: "Run all checks (format, lint, type-check, test)"
    deps:
      - fmt
      - lint
      - type-check
      - test

  build:
    desc: "Build Python package distribution"
    cmds:
      - uv build

  build-all:
    desc: "Build for multiple platforms (Python is platform-independent)"
    cmds:
      - uv build
  
  tidy:
    desc: "Tidy dependencies and update lock file"
    cmds:
      - uv sync --upgrade
      - uv export --no-hashes -o requirements.txt

  tool-install:
    desc: "Install as uv tool (alternative to install)"
    cmds:
      - uv tool install --force .

  publish:
    desc: "Publish package to PyPI (use with caution)"
    cmds:
      - uv publish

  lock:
    desc: "Export dependencies to requirements.txt"
    cmds:
      - uv export --no-hashes -o requirements.txt


